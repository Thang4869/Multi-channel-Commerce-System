name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: commerce_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install

    # Auth Service
    - name: Lint Auth Service
      run: cd services/auth-service && yarn lint || true
      continue-on-error: true

    - name: Build Auth Service
      run: cd services/auth-service && yarn build
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/commerce_db
        JWT_SECRET: test-secret
        JWT_REFRESH_SECRET: test-refresh-secret

    # Order Service
    - name: Lint Order Service
      run: cd services/order-service && yarn lint || true
      continue-on-error: true

    - name: Build Order Service
      run: cd services/order-service && yarn build
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/commerce_db
        JWT_SECRET: test-secret

    # Warehouse Dashboard
    - name: Build Warehouse Dashboard
      run: cd apps/web/warehouse-dashboard && yarn build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3001

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Auth Service Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: services/auth-service/Dockerfile
        push: false
        tags: commerce/auth-service:latest

    - name: Build Order Service Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: services/order-service/Dockerfile
        push: false
        tags: commerce/order-service:latest

    - name: Build Warehouse Dashboard Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: apps/web/warehouse-dashboard/Dockerfile
        push: false
        tags: commerce/warehouse-dashboard:latest
