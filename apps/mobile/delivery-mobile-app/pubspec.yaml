name: delivery_app
description: Delivery Mobile Application for Multi-Channel Commerce System.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.1.0
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0

  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # Date & Time
  intl: ^0.19.0

  # Utils
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
